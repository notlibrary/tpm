name: Release Toothpaste Picking Manager

on:
  push:
    tags:
      - "*"

env:
  APP_NAME: tpm-win-bin-amd64  

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: softprops/action-gh-release@v2
        id: create
        with:
          tag_name: ${{ github.ref_name }}
          name: TPM 
          draft: false
          prerelease: false
          body: Toothpaste picking manager
          token: ${{ secrets.PAT3 }}

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install gettext via vcpkg
        if: runner.os == 'Windows'
        run: | 
          vcpkg install gettext:x64-windows


      - name: Set up MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64 

      - name: Setup .NET
        if: runner.os == 'Windows'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX
        if: runner.os == 'Windows'
        run: dotnet tool install --global wix --version 7.0.0
       
      - name: Install Gettext via Chocolatey
        if: runner.os == 'Windows'
        run: |
          choco install gettext --no-progress -y
          echo "C:\Program Files\gettext-iconv" >> $GITHUB_PATH
        
      - name: Build on Windows
        if: runner.os == 'Windows'
        id: build        
        shell: powershell
        run: |
          $env:VCPKG_ROOT = "${env:VCPKG_INSTALLATION_ROOT}\installed\x64-windows"
          $env:LIB = "${env:VCPKG_ROOT}\lib;${env:LIB}"
          nmake /f Makefile.msc update-po
          nmake -e /f Makefile.msc tpm.exe
          Get-ChildItem -Path .\locale -Recurse -Filter *.mo -ErrorAction SilentlyContinue
          Copy-Item -Path "C:\vcpkg\buildtrees\gettext-libintl\x64-windows-rel\.libs\intl-8.dll" -Destination ".\intl-8.dll" -Force
          Copy-Item -Path "C:\vcpkg\buildtrees\libiconv\x64-windows-rel\lib\.libs\iconv-2.dll" -Destination ".\iconv-2.dll" -Force
          wix build -acceptEula wix7 tpm.wxs -arch x64 -out tpm-win-bin-amd64-${{ github.ref_name }}.msi 
          Remove-Item tpm.exe -ErrorAction SilentlyContinue
          Remove-Item tpm.exp -ErrorAction SilentlyContinue
          Remove-Item tpm.lib -ErrorAction SilentlyContinue
          Remove-Item tpm.res -ErrorAction SilentlyContinue
          Remove-Item *.obj -ErrorAction SilentlyContinue
          

      
      - name: Upload to Release Win
        if: runner.os == 'Windows'       
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.PAT3 }}
          files: tpm-win-bin-amd64-${{ github.ref_name }}.msi
      
      - name: Install Gettext
        if: runner.os != 'Windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext      
      
      - name: Build on Linux
        if: runner.os != 'Windows'
        shell: bash
        run: |
          make -f tpm-ubuntu.mk tpm docs update-po dist
          mv tpm-linux-bin-amd64.tar.gz tpm-linux-bin-amd64-${{ github.ref_name }}.tar.gz           
            
      - name: Upload to Release Linux
        if: runner.os != 'Windows'       
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.PAT3 }}
          files: tpm-linux-bin-amd64-${{ github.ref_name }}.tar.gz   
          
      - name: Setup emcc
        if: runner.os != 'Windows'
        uses: emscripten-core/setup-emsdk@v15
      
      - name: Build on WASM
        if: runner.os != 'Windows'
        shell: bash
        run: |
          make -f tpm-wasm.mk tpm.wasm update-po dist
          mv tpm-wasm-bin-amd64.tar.gz tpm-wasm-bin-amd64-${{ github.ref_name }}.tar.gz
            
      - name: Upload to Release WASM
        if: runner.os != 'Windows'       
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.PAT3 }}
          files: tpm-wasm-bin-amd64-${{ github.ref_name }}.tar.gz  
          
      - name: Install autotools
        if: runner.os != 'Windows'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool  
            
      - name: Reconfigure build env 
        if: runner.os != 'Windows'
        shell: bash
        run: |
          autoreconf -ivf
          ./configure
          make all-local
          make dist
          mv tpm-${{ github.ref_name }}.tar.gz tpm-unix-tarball-amd64-${{ github.ref_name }}.tar.gz  
      
      - name: Upload Unix tarball to Release
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.PAT3 }}
          files: tpm-unix-tarball-amd64-${{ github.ref_name }}.tar.gz

     